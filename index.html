<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - WalletConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        .qr-code-container canvas {
            margin: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-teal-700 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Main Card -->
        <div class="bg-white rounded-lg shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-teal-600 p-6">
                <h1 class="text-3xl font-bold text-white">TRON dApp</h1>
                <p class="text-blue-100 text-sm mt-1">WalletConnect Integration</p>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Status Badge -->
                <div class="mb-6">
                    <div id="status-badge" class="inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold">
                        🔴 Disconnected
                    </div>
                </div>

                <!-- QR Code Container -->
                <div id="qr-container" class="mb-6 p-4 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300 flex justify-center items-center" style="min-height: 250px;">
                    <div id="qrcode" class="qr-code-container"></div>
                </div>

                <!-- Wallet Address Display -->
                <div id="wallet-info" class="hidden mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p class="text-sm text-gray-600 mb-2">Connected Wallet:</p>
                    <p id="wallet-address" class="font-mono text-sm text-blue-900 break-all font-bold"></p>
                    <p class="text-sm text-gray-600 mb-2 mt-4">Network:</p>
                    <p id="network-display" class="font-mono text-sm text-blue-900 font-bold">TRON Mainnet</p>
                </div>

                <!-- Connect/Disconnect Button -->
                <div class="space-y-3">
                    <button id="connect-btn" onclick="connectWallet()" class="w-full bg-gradient-to-r from-blue-600 to-teal-600 hover:from-blue-700 hover:to-teal-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 active:scale-95">
                        🔗 Connect Wallet
                    </button>
                    <button id="disconnect-btn" onclick="disconnectWallet()" class="hidden w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 rounded-lg transition">
                        🔌 Disconnect
                    </button>
                </div>

                <!-- Status Message -->
                <div id="status-message" class="mt-4 p-3 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm">
                    <p>👉 Click "Connect Wallet" to generate QR code</p>
                </div>

                <!-- Additional Functions (Ready for expansion) -->
                <div id="functions-container" class="hidden mt-6 pt-6 border-t border-gray-200">
                    <p class="text-xs text-gray-500 mb-3 font-semibold">ADDITIONAL FUNCTIONS</p>
                    <div class="space-y-2">
                        <button onclick="sendTransaction()" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 rounded-lg text-sm transition">
                            📤 Send Transaction
                        </button>
                        <button onclick="checkBalance()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 rounded-lg text-sm transition">
                            💰 Check Balance
                        </button>
                        <button onclick="signMessage()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 rounded-lg text-sm transition">
                            🔄 Sign Message
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-xs text-gray-600 text-center">
                    Powered by WalletConnect | TRON Network | v1.0
                </p>
            </div>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const WALLETCONNECT_PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f';
        const TRON_MAINNET_CHAIN_ID = '0x728282';
        
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let session = null;
        let connectionInProgress = false;

        // ============================================
        // INITIALIZE
        // ============================================
        async function initApp() {
            try {
                console.log('🚀 Initializing TRON dApp...');
                
                // Check for existing session
                const sessionString = localStorage.getItem('walletconnect_session');
                if (sessionString) {
                    try {
                        session = JSON.parse(sessionString);
                        console.log('✅ Session restored:', session.accounts[0]);
                        updateConnectedUI(session.accounts[0]);
                    } catch (e) {
                        console.error('❌ Error restoring session:', e);
                        localStorage.removeItem('walletconnect_session');
                    }
                }
            } catch (error) {
                console.error('❌ Initialization error:', error);
            }
        }

        // ============================================
        // CONNECT WALLET
        // ============================================
        async function connectWallet() {
            if (connectionInProgress) {
                console.warn('⚠️ Connection already in progress');
                return;
            }

            try {
                connectionInProgress = true;
                updateStatus('loading', '🔄 Generating QR Code...');
                console.log('🔗 Connecting wallet...');

                // Generate WalletConnect URI
                const wcUri = generateWalletConnectURI();
                console.log('Generated URI:', wcUri);
                
                // Clear previous QR code
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                // Generate QR Code with proper options
                try {
                    new QRCode(qrContainer, {
                        text: wcUri,
                        width: 220,
                        height: 220,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    console.log('✅ QR Code generated successfully');
                } catch (qrError) {
                    console.error('❌ QR Code generation error:', qrError);
                    updateStatus('error', '❌ Failed to generate QR code');
                    connectionInProgress = false;
                    return;
                }

                updateStatus('success', '📱 Scan QR code with Trust Wallet');
                document.getElementById('status-message').innerHTML = 
                    '<p>🔐 Open Trust Wallet → Tap WalletConnect → Scan QR Code</p>';
                
                // Simulate connection after delay
                setTimeout(() => {
                    simulateSuccessfulConnection();
                    connectionInProgress = false;
                }, 3000);

            } catch (error) {
                console.error('❌ Connection error:', error);
                updateStatus('error', '❌ Connection failed: ' + error.message);
                connectionInProgress = false;
            }
        }

        // ============================================
        // GENERATE WALLETCONNECT URI
        // ============================================
        function generateWalletConnectURI() {
            const uuid = generateUUID();
            const symKey = generateSymKey();
            return `wc:${uuid}@2?projectId=${WALLETCONNECT_PROJECT_ID}&relayProtocol=irn&symKey=${symKey}`;
        }

        // ============================================
        // SIMULATE SUCCESSFUL CONNECTION
        // ============================================
        function simulateSuccessfulConnection() {
            // Generate TRON address (starts with T)
            const mockTronAddress = generateTronAddress();

            session = {
                accounts: [mockTronAddress],
                chainId: TRON_MAINNET_CHAIN_ID,
                connected: true,
                timestamp: new Date().toISOString()
            };
            
            // Save session
            localStorage.setItem('walletconnect_session', JSON.stringify(session));
            
            // Update UI
            updateConnectedUI(mockTronAddress);
            
            console.log('✅ Connected to TRON network:', mockTronAddress);
        }

        // ============================================
        // UPDATE CONNECTED UI
        // ============================================
        function updateConnectedUI(address) {
            // Update status badge
            document.getElementById('status-badge').innerHTML = '🟢 Connected';
            document.getElementById('status-badge').className = 
                'inline-block px-4 py-2 rounded-full bg-green-100 text-green-800 text-sm font-semibold';
            
            // Display wallet address
            document.getElementById('wallet-address').textContent = address;
            document.getElementById('wallet-info').classList.remove('hidden');
            
            // Toggle buttons
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('disconnect-btn').classList.remove('hidden');
            
            // Hide QR code
            document.getElementById('qr-container').classList.add('hidden');
            
            // Show additional functions
            document.getElementById('functions-container').classList.remove('hidden');
            
            // Update status message
            document.getElementById('status-message').innerHTML = 
                '<p class="text-green-800">✅ Successfully connected to TRON network!</p>';
        }

        // ============================================
        // DISCONNECT WALLET
        // ============================================
        function disconnectWallet() {
            try {
                session = null;
                localStorage.removeItem('walletconnect_session');
                
                // Update UI
                document.getElementById('status-badge').innerHTML = '🔴 Disconnected';
                document.getElementById('status-badge').className = 
                    'inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold';
                
                document.getElementById('wallet-info').classList.add('hidden');
                document.getElementById('qr-container').classList.remove('hidden');
                document.getElementById('qr-container').innerHTML = '';
                
                document.getElementById('connect-btn').classList.remove('hidden');
                document.getElementById('disconnect-btn').classList.add('hidden');
                
                document.getElementById('functions-container').classList.add('hidden');
                
                document.getElementById('status-message').innerHTML = 
                    '<p>👉 Click "Connect Wallet" to reconnect</p>';
                
                console.log('✅ Disconnected from wallet');
            } catch (error) {
                console.error('❌ Disconnect error:', error);
                updateStatus('error', 'Failed to disconnect');
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function updateStatus(type, message) {
            const statusMsg = document.getElementById('status-message');
            statusMsg.textContent = message;
            
            statusMsg.className = 'mt-4 p-3 rounded-lg text-sm';
            
            switch(type) {
                case 'success':
                    statusMsg.className += ' bg-green-50 border border-green-200 text-green-800';
                    break;
                case 'error':
                    statusMsg.className += ' bg-red-50 border border-red-200 text-red-800';
                    break;
                case 'loading':
                    statusMsg.className += ' bg-blue-50 border border-blue-200 text-blue-800';
                    break;
                default:
                    statusMsg.className += ' bg-yellow-50 border border-yellow-200 text-yellow-800';
            }
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function generateSymKey() {
            return Array.from(crypto.getRandomValues(new Uint8Array(32)))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function generateTronAddress() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let address = 'T';
            for (let i = 0; i < 33; i++) {
                address += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return address;
        }

        // ============================================
        // PLACEHOLDER FUNCTIONS FOR FUTURE FEATURES
        // ============================================
        function sendTransaction() {
            if (!session) {
                alert('❌ Please connect wallet first');
                return;
            }
            console.log('📤 Send Transaction - Coming soon!');
            updateStatus('info', '📤 Send Transaction feature coming soon!');
        }

        function checkBalance() {
            if (!session) {
                alert('❌ Please connect wallet first');
                return;
            }
            console.log('💰 Check Balance - Coming soon!');
            updateStatus('info', '💰 Check Balance feature coming soon!');
        }

        function signMessage() {
            if (!session) {
                alert('❌ Please connect wallet first');
                return;
            }
            console.log('🔄 Sign Message - Coming soon!');
            updateStatus('info', '🔄 Sign Message feature coming soon!');
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        window.addEventListener('load', () => {
            initApp();
            console.log('✅ Page loaded and initialized');
        });

        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && session) {
                console.log('📍 Page visible, session active');
            }
        });
    </script>
</body>
</html>
