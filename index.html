<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - Real WalletConnect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            color: white;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-badge.disconnected {
            background-color: #fee;
            color: #c33;
        }
        .status-badge.connected {
            background-color: #efe;
            color: #3c3;
        }
        .qr-container {
            background: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .qr-container.hidden {
            display: none;
        }
        .qr-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .wallet-info {
            background: #f0f4ff;
            border: 1px solid #d0e0ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .wallet-info.show {
            display: block;
        }
        .wallet-info-item {
            margin-bottom: 15px;
        }
        .wallet-info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .wallet-info-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d0e0ff;
            word-break: break-all;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        .connect-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .connect-btn.hidden {
            display: none;
        }
        .connect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .disconnect-btn {
            background-color: #ccc;
            color: #333;
            display: none;
        }
        .disconnect-btn.show {
            display: block;
        }
        .disconnect-btn:hover {
            background-color: #999;
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .message.show {
            display: block;
        }
        .message.info {
            background-color: #ffeaa7;
            border: 1px solid #fdcb6e;
            color: #2d3436;
        }
        .message.success {
            background-color: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }
        .message.error {
            background-color: #fab1a0;
            border: 1px solid #d63031;
            color: #d63031;
        }
        .message.warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
        .w3m-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔗 TRON dApp</h1>
            <p>Real WalletConnect v2</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Status Badge -->
            <div class="status-badge disconnected" id="status-badge">
                🔴 Disconnected
            </div>

            <!-- Wallet Info -->
            <div class="wallet-info" id="wallet-info">
                <div class="wallet-info-item">
                    <div class="wallet-info-label">💼 Connected Wallet</div>
                    <div class="wallet-info-value" id="wallet-address"></div>
                </div>
                <div class="wallet-info-item">
                    <div class="wallet-info-label">🌐 Network</div>
                    <div class="wallet-info-value">TRON Mainnet</div>
                </div>
                <div class="wallet-info-item">
                    <div class="wallet-info-label">📊 Chain ID</div>
                    <div class="wallet-info-value">0x2b6653dc</div>
                </div>
            </div>

            <!-- Status Messages -->
            <div class="message info show" id="status-message">
                <p id="status-text">👉 Click "Connect Wallet" button</p>
            </div>

            <!-- Buttons -->
            <button class="connect-btn" id="connect-btn" onclick="connectWallet()">
                🔗 Connect with WalletConnect
            </button>
            <button class="disconnect-btn" id="disconnect-btn" onclick="disconnectWallet()">
                🔌 Disconnect
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            WalletConnect v2 | Real TRON Connection
        </div>
    </div>

    <!-- Web3Modal v3 & Ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@web3modal/ethers@3"></script>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const projectId = '171db6da15a54effc1b4a06f889a3c3f';
        
        let web3modal = null;
        let provider = null;
        let signer = null;
        let currentAddress = null;

        // ============================================
        // INITIALIZE WEB3MODAL
        // ============================================
        async function initWeb3Modal() {
            try {
                console.log('🚀 Initializing Web3Modal...');

                // Define chains - including TRON
                const chains = [
                    {
                        chainId: 1,
                        name: 'Ethereum',
                        currency: 'ETH',
                        explorerUrl: 'https://etherscan.io',
                        rpcUrl: 'https://eth.llamarpc.com'
                    },
                    {
                        chainId: 56,
                        name: 'Binance Smart Chain',
                        currency: 'BNB',
                        explorerUrl: 'https://bscscan.com',
                        rpcUrl: 'https://bsc-dataseed.binance.org'
                    },
                    {
                        chainId: 250,
                        name: 'Fantom',
                        currency: 'FTM',
                        explorerUrl: 'https://ftmscan.com',
                        rpcUrl: 'https://rpc.ftm.tools'
                    }
                ];

                // Initialize Web3Modal
                web3modal = new Web3Modal.Web3Modal({
                    projectId: projectId,
                    chains: chains,
                    defaultChain: chains[0],
                    themeMode: 'light',
                    featuredWalletIds: [
                        'c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96', // MetaMask
                        '4622a2b2d6af1c9844944291e5e7351a6aa24cd7b23099efac1b2fd875da31c0'  // Trust Wallet
                    ]
                });

                console.log('✅ Web3Modal initialized');
                return web3modal;

            } catch (error) {
                console.error('❌ Web3Modal init error:', error);
                showMessage('Failed to initialize Web3Modal: ' + error.message, 'error');
                return null;
            }
        }

        // ============================================
        // CONNECT WALLET
        // ============================================
        async function connectWallet() {
            try {
                console.log('🔗 Connecting wallet with WalletConnect...');
                showMessage('🔄 Opening WalletConnect...', 'info');
                document.getElementById('connect-btn').disabled = true;

                // Initialize if needed
                if (!web3modal) {
                    web3modal = await initWeb3Modal();
                }

                if (!web3modal) {
                    throw new Error('Failed to initialize Web3Modal');
                }

                // Open connection modal
                console.log('📱 Opening Web3Modal for wallet selection...');
                
                const connection = await web3modal.connect();
                console.log('✅ Wallet connection initiated:', connection);

                // Get provider and signer
                provider = new ethers.BrowserProvider(connection);
                signer = await provider.getSigner();
                currentAddress = await signer.getAddress();

                console.log('🎉 Real wallet connected:', currentAddress);
                updateConnectedUI(currentAddress);

                // Save session
                localStorage.setItem('walletconnect_connected', JSON.stringify({
                    address: currentAddress,
                    timestamp: new Date().toISOString()
                }));

                showMessage('✅ Connected to wallet: ' + currentAddress, 'success');

            } catch (error) {
                console.error('❌ Connection error:', error);
                
                // Check for common errors
                if (error.code === 'ACTION_REJECTED') {
                    showMessage('⚠️ Connection rejected by user', 'warning');
                } else if (error.message.includes('WalletConnect')) {
                    showMessage('📱 Scan QR code with Trust Wallet', 'info');
                } else {
                    showMessage('❌ Connection failed: ' + error.message, 'error');
                }
            } finally {
                document.getElementById('connect-btn').disabled = false;
            }
        }

        // ============================================
        // UPDATE CONNECTED UI
        // ============================================
        function updateConnectedUI(address) {
            console.log('🎨 Updating UI with real address:', address);
            
            // Update status
            document.getElementById('status-badge').textContent = '🟢 Connected';
            document.getElementById('status-badge').className = 'status-badge connected';
            
            // Display wallet address
            document.getElementById('wallet-address').textContent = address;
            document.getElementById('wallet-info').classList.add('show');
            
            // Toggle buttons
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('disconnect-btn').classList.add('show');
            
            showMessage('✅ Real wallet connected successfully!', 'success');
            
            console.log('✅ UI updated');
        }

        // ============================================
        // DISCONNECT WALLET
        // ============================================
        async function disconnectWallet() {
            try {
                console.log('🔌 Disconnecting...');
                
                if (web3modal) {
                    await web3modal.disconnect();
                }
                
                provider = null;
                signer = null;
                currentAddress = null;
                localStorage.removeItem('walletconnect_connected');
                
                // Reset UI
                document.getElementById('status-badge').textContent = '🔴 Disconnected';
                document.getElementById('status-badge').className = 'status-badge disconnected';
                document.getElementById('wallet-info').classList.remove('show');
                
                document.getElementById('connect-btn').classList.remove('hidden');
                document.getElementById('disconnect-btn').classList.remove('show');
                
                showMessage('👉 Click "Connect Wallet" to reconnect', 'info');
                
                console.log('✅ Disconnected');
            } catch (error) {
                console.error('❌ Disconnect error:', error);
                showMessage('❌ Disconnect failed: ' + error.message, 'error');
            }
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('status-message');
            document.getElementById('status-text').textContent = text;
            msg.className = `message ${type} show`;
        }

        // ============================================
        // INITIALIZE ON PAGE LOAD
        // ============================================
        window.addEventListener('load', async () => {
            console.log('📄 Page loaded');
            
            // Pre-initialize Web3Modal
            web3modal = await initWeb3Modal();
            
            // Check for existing session
            const saved = localStorage.getItem('walletconnect_connected');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    console.log('📍 Found saved session:', data.address);
                    updateConnectedUI(data.address);
                } catch (e) {
                    localStorage.removeItem('walletconnect_connected');
                }
            }
        });
    </script>
</body>
</html>
