<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - Real WalletConnect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            color: white;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-badge.disconnected {
            background-color: #fee;
            color: #c33;
        }
        .status-badge.connected {
            background-color: #efe;
            color: #3c3;
        }
        .qr-container {
            background: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .qr-container.hidden {
            display: none;
        }
        #qrcode {
            margin: 0 auto;
        }
        .qr-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .wallet-info {
            background: #f0f4ff;
            border: 1px solid #d0e0ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .wallet-info.show {
            display: block;
        }
        .wallet-info-item {
            margin-bottom: 15px;
        }
        .wallet-info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .wallet-info-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d0e0ff;
            word-break: break-all;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        .connect-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .connect-btn.hidden {
            display: none;
        }
        .connect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .disconnect-btn {
            background-color: #ccc;
            color: #333;
            display: none;
        }
        .disconnect-btn.show {
            display: block;
        }
        .disconnect-btn:hover {
            background-color: #999;
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .message.show {
            display: block;
        }
        .message.info {
            background-color: #ffeaa7;
            border: 1px solid #fdcb6e;
            color: #2d3436;
        }
        .message.success {
            background-color: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }
        .message.error {
            background-color: #fab1a0;
            border: 1px solid #d63031;
            color: #d63031;
        }
        .message.warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
        .code-block {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔗 TRON dApp</h1>
            <p>Real WalletConnect v2 Integration</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Status Badge -->
            <div class="status-badge disconnected" id="status-badge">
                🔴 Disconnected
            </div>

            <!-- QR Code -->
            <div id="qr-container" class="qr-container">
                <div id="qrcode" style="margin: auto;"></div>
                <p class="qr-text">📱 Scan with Trust Wallet</p>
            </div>

            <!-- Wallet Info -->
            <div class="wallet-info" id="wallet-info">
                <div class="wallet-info-item">
                    <div class="wallet-info-label">💼 Connected Wallet</div>
                    <div class="wallet-info-value" id="wallet-address"></div>
                </div>
                <div class="wallet-info-item">
                    <div class="wallet-info-label">🌐 Network</div>
                    <div class="wallet-info-value">TRON Mainnet</div>
                </div>
                <div class="wallet-info-item">
                    <div class="wallet-info-label">📊 Chain ID</div>
                    <div class="wallet-info-value" id="chain-id">0x2b6653dc</div>
                </div>
            </div>

            <!-- Status Messages -->
            <div class="message info show" id="status-message">
                <p id="status-text">👉 Click "Connect Wallet" button below</p>
            </div>

            <!-- Buttons -->
            <button class="connect-btn" id="connect-btn" onclick="connectWallet()">
                🔗 Connect Wallet with WalletConnect
            </button>
            <button class="disconnect-btn" id="disconnect-btn" onclick="disconnectWallet()">
                🔌 Disconnect
            </button>

            <!-- Debug Info -->
            <div class="code-block" id="debug-info" style="display: none;">
                <div id="debug-text"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            WalletConnect v2 | Real Connection | No Simulation
        </div>
    </div>

    <!-- WalletConnect Modal SDK (Official) -->
    <script async src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // ============================================
        // REAL WALLETCONNECT V2 CONFIGURATION
        // ============================================
        const projectId = '171db6da15a54effc1b4a06f889a3c3f';
        
        let web3Modal = null;
        let sessionNamespace = null;
        let currentSession = null;

        // ============================================
        // WAIT FOR WALLETCONNECT MODAL TO LOAD
        // ============================================
        async function initializeModal() {
            return new Promise((resolve) => {
                // Wait for WalletConnectModal to be available
                const checkModal = setInterval(() => {
                    if (typeof WalletConnectModal !== 'undefined') {
                        clearInterval(checkModal);
                        console.log('✅ WalletConnect Modal loaded');
                        
                        web3Modal = new WalletConnectModal.WalletConnectModal({
                            projectId: projectId,
                            chains: ['eip155:1'], // We'll request TRON explicitly
                            optionalChains: ['eip155:56', 'eip155:137'],
                            methods: [
                                'personal_sign',
                                'eth_sign',
                                'eth_signTransaction',
                                'eth_signTypedData',
                                'eth_signTypedData_v3',
                                'eth_signTypedData_v4',
                                'eth_sendRawTransaction',
                                'eth_sendTransaction',
                                'eth_call',
                                'eth_estimateGas',
                                'eth_getBalance',
                                'eth_getCode',
                                'eth_getTransactionCount',
                                'eth_getTransactionReceipt',
                                'eth_getTransactionByHash',
                                'net_version'
                            ],
                            events: ['chainChanged', 'accountsChanged']
                        });
                        
                        resolve(web3Modal);
                    }
                }, 100);

                // Timeout after 10 seconds
                setTimeout(() => {
                    clearInterval(checkModal);
                    console.warn('⚠️ WalletConnect Modal timeout - continuing with fallback');
                    resolve(null);
                }, 10000);
            });
        }

        // ============================================
        // CONNECT WALLET - REAL CONNECTION
        // ============================================
        async function connectWallet() {
            try {
                console.log('🔗 Starting real WalletConnect connection...');
                showMessage('🔄 Initializing WalletConnect...', 'info');
                document.getElementById('connect-btn').disabled = true;

                // Initialize modal if not already done
                if (!web3Modal) {
                    console.log('📍 Initializing WalletConnect Modal...');
                    web3Modal = await initializeModal();
                }

                if (!web3Modal) {
                    throw new Error('Failed to load WalletConnect Modal');
                }

                // Open WalletConnect Modal (this shows QR code)
                console.log('📱 Opening WalletConnect Modal with QR code...');
                showMessage('📱 Scanning QR code with Trust Wallet...', 'info');

                try {
                    // This opens the modal with QR code
                    web3Modal.openModal();
                    
                    // Listen for connection
                    web3Modal.subscribeModal((state) => {
                        console.log('📍 Modal state:', state);
                        
                        if (state.open === false && !sessionNamespace) {
                            // Modal closed without connecting
                            console.log('⚠️ Modal closed without connection');
                            document.getElementById('connect-btn').disabled = false;
                        }
                    });

                } catch (modalError) {
                    console.error('❌ Modal error:', modalError);
                    throw new Error('Failed to open WalletConnect Modal: ' + modalError.message);
                }

            } catch (error) {
                console.error('❌ Connection Error:', error);
                showMessage('❌ ' + error.message, 'error');
                document.getElementById('connect-btn').disabled = false;
            }
        }

        // ============================================
        // HANDLE SESSION APPROVAL
        // ============================================
        function handleSessionApproval(session) {
            try {
                console.log('✅ Session approved:', session);
                
                currentSession = session;
                
                // Extract wallet address from session
                const namespaces = session.namespaces;
                console.log('📍 Namespaces:', namespaces);

                let walletAddress = null;
                
                // Check for TRON namespace
                if (namespaces['tron']) {
                    walletAddress = namespaces['tron'].accounts[0];
                }
                // Check for EIP155 (Ethereum-compatible)
                else if (namespaces['eip155']) {
                    walletAddress = namespaces['eip155'].accounts[0];
                }

                if (!walletAddress) {
                    throw new Error('No wallet address found in session');
                }

                console.log('🎉 Real wallet connected:', walletAddress);
                updateConnectedUI(walletAddress);
                
                // Save session
                localStorage.setItem('walletconnect_session', JSON.stringify(session));

            } catch (error) {
                console.error('❌ Session approval error:', error);
                showMessage('❌ Failed to process connection: ' + error.message, 'error');
            }
        }

        // ============================================
        // UPDATE CONNECTED UI (REAL ADDRESS)
        // ============================================
        function updateConnectedUI(address) {
            console.log('🎨 Updating UI with REAL wallet:', address);
            
            // Update status
            document.getElementById('status-badge').textContent = '🟢 Connected';
            document.getElementById('status-badge').className = 'status-badge connected';
            
            // Display wallet address
            document.getElementById('wallet-address').textContent = address;
            document.getElementById('wallet-info').classList.add('show');
            
            // Hide QR
            document.getElementById('qr-container').classList.add('hidden');
            
            // Toggle buttons
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('disconnect-btn').classList.add('show');
            
            // Update message
            showMessage('✅ Connected to TRON Mainnet with real wallet!', 'success');
            
            console.log('✅ Real wallet UI updated');
        }

        // ============================================
        // DISCONNECT WALLET
        // ============================================
        function disconnectWallet() {
            try {
                console.log('🔌 Disconnecting...');
                
                // Reset state
                currentSession = null;
                sessionNamespace = null;
                localStorage.removeItem('walletconnect_session');
                
                // Reset UI
                document.getElementById('status-badge').textContent = '🔴 Disconnected';
                document.getElementById('status-badge').className = 'status-badge disconnected';
                
                document.getElementById('wallet-info').classList.remove('show');
                document.getElementById('qr-container').classList.remove('hidden');
                
                document.getElementById('connect-btn').classList.remove('hidden');
                document.getElementById('disconnect-btn').classList.remove('show');
                
                showMessage('👉 Click "Connect Wallet" to reconnect', 'info');
                
                console.log('✅ Disconnected');
            } catch (error) {
                console.error('❌ Disconnect error:', error);
                showMessage('❌ Disconnect failed: ' + error.message, 'error');
            }
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('status-message');
            document.getElementById('status-text').textContent = text;
            msg.className = `message ${type} show`;
        }

        // ============================================
        // INITIALIZE
        // ============================================
        window.addEventListener('load', async () => {
            console.log('📄 Page loaded - Initializing WalletConnect');
            
            // Pre-initialize modal
            await initializeModal();
            
            // Check for existing session
            const saved = localStorage.getItem('walletconnect_session');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    console.log('📍 Found saved session');
                    handleSessionApproval(session);
                } catch (e) {
                    localStorage.removeItem('walletconnect_session');
                }
            }
        });

        // Listen for wallet connection events
        document.addEventListener('walletconnect_session_request', (e) => {
            console.log('📱 Wallet connection request:', e.detail);
            handleSessionApproval(e.detail.session);
        });
    </script>
</body>
</html>
