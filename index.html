<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - WalletConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-teal-700 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Main Card -->
        <div class="bg-white rounded-lg shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-teal-600 p-6">
                <h1 class="text-3xl font-bold text-white">TRON dApp</h1>
                <p class="text-blue-100 text-sm mt-1">WalletConnect Integration</p>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Status Badge -->
                <div class="mb-6">
                    <div id="status-badge" class="inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold">
                        🔴 Disconnected
                    </div>
                </div>

                <!-- QR Code Container -->
                <div id="qr-container" class="mb-6 p-4 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300 flex justify-center items-center" style="min-height: 250px;">
                    <div id="qrcode"></div>
                </div>

                <!-- Wallet Address Display -->
                <div id="wallet-info" class="hidden mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p class="text-sm text-gray-600 mb-2">Connected Wallet:</p>
                    <p id="wallet-address" class="font-mono text-sm text-blue-900 break-all font-bold"></p>
                </div>

                <!-- Connect/Disconnect Button -->
                <div class="space-y-3">
                    <button id="connect-btn" onclick="connectWallet()" class="w-full bg-gradient-to-r from-blue-600 to-teal-600 hover:from-blue-700 hover:to-teal-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 active:scale-95">
                        Connect Wallet
                    </button>
                    <button id="disconnect-btn" onclick="disconnectWallet()" class="hidden w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 rounded-lg transition">
                        Disconnect
                    </button>
                </div>

                <!-- Status Message -->
                <div id="status-message" class="mt-4 p-3 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm">
                    <p>Click "Connect Wallet" to generate QR code</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-xs text-gray-600 text-center">
                    Powered by WalletConnect | TRON Network
                </p>
            </div>
        </div>
    </div>

    <script>
        // WalletConnect Configuration
        const projectId = '171db6da15a54effc1b4a06f889a3c3f'; // Get from cloud.walletconnect.com
        let client = null;
        let session = null;

        // Initialize WalletConnect
        async function initWalletConnect() {
            try {
                if (!projectId || projectId === '171db6da15a54effc1b4a06f889a3c3f') {
                    updateStatus('error', 'Please set your WalletConnect Project ID');
                    return;
                }

                // For this demo, we'll use a simpler approach with the WalletConnect URL
                const sessionString = localStorage.getItem('wc_session');
                if (sessionString) {
                    session = JSON.parse(sessionString);
                }
            } catch (error) {
                console.error('WalletConnect initialization error:', error);
            }
        }

        // Connect Wallet
        async function connectWallet() {
            try {
                updateStatus('loading', 'Generating QR Code...');
                
                // Create WalletConnect URI
                const walletConnectUrl = `https://bridge.walletconnect.org?key=${projectId}`;
                
                // Generate QR Code
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                new QRCode(qrContainer, {
                    text: walletConnectUrl,
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                updateStatus('success', 'Scan QR code with Trust Wallet');
                document.getElementById('status-message').innerHTML = 
                    '<p>📱 Open Trust Wallet and scan the QR code above</p>';
                
                // Simulate connection (in production, WalletConnect would handle this)
                setTimeout(() => {
                    simulateConnection();
                }, 2000);

            } catch (error) {
                console.error('Connection error:', error);
                updateStatus('error', 'Connection failed. Please try again.');
            }
        }

        // Simulate wallet connection (replace with real WalletConnect logic)
        function simulateConnection() {
            const mockAddress = '0x' + Array(40).fill(0).map(() => Math.floor(Math.random() * 16).toString(16)).join('');
            session = {
                accounts: [mockAddress],
                chainId: 1,
                connected: true
            };
            
            localStorage.setItem('wc_session', JSON.stringify(session));
            updateConnectedUI(mockAddress);
        }

        // Update Connected UI
        function updateConnectedUI(address) {
            document.getElementById('status-badge').innerHTML = '🟢 Connected';
            document.getElementById('status-badge').className = 'inline-block px-4 py-2 rounded-full bg-green-100 text-green-800 text-sm font-semibold';
            
            document.getElementById('wallet-address').textContent = address;
            document.getElementById('wallet-info').classList.remove('hidden');
            
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('disconnect-btn').classList.remove('hidden');
            
            document.getElementById('qr-container').classList.add('hidden');
            
            document.getElementById('status-message').innerHTML = 
                '<p class="text-green-800">✅ Wallet connected successfully!</p>';
        }

        // Disconnect Wallet
        function disconnectWallet() {
            session = null;
            localStorage.removeItem('wc_session');
            
            document.getElementById('status-badge').innerHTML = '🔴 Disconnected';
            document.getElementById('status-badge').className = 'inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold';
            
            document.getElementById('wallet-info').classList.add('hidden');
            document.getElementById('qr-container').classList.remove('hidden');
            document.getElementById('qr-container').innerHTML = '';
            
            document.getElementById('connect-btn').classList.remove('hidden');
            document.getElementById('disconnect-btn').classList.add('hidden');
            
            document.getElementById('status-message').innerHTML = 
                '<p>Disconnected. Click "Connect Wallet" to reconnect</p>';
        }

        // Update Status Helper
        function updateStatus(type, message) {
            const statusMsg = document.getElementById('status-message');
            statusMsg.textContent = message;
            
            statusMsg.className = 'mt-4 p-3 rounded-lg text-sm';
            if (type === 'success') {
                statusMsg.className += ' bg-green-50 border border-green-200 text-green-800';
            } else if (type === 'error') {
                statusMsg.className += ' bg-red-50 border border-red-200 text-red-800';
            } else if (type === 'loading') {
                statusMsg.className += ' bg-blue-50 border border-blue-200 text-blue-800';
            } else {
                statusMsg.className += ' bg-yellow-50 border border-yellow-200 text-yellow-800';
            }
        }

        // Check for existing session on load
        window.addEventListener('load', () => {
            initWalletConnect();
            const sessionString = localStorage.getItem('wc_session');
            if (sessionString) {
                const savedSession = JSON.parse(sessionString);
                updateConnectedUI(savedSession.accounts[0]);
            }
        });
    </script>
</body>
</html>
