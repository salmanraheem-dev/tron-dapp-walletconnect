<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - Real WalletConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-teal-700 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Main Card -->
        <div class="bg-white rounded-lg shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-teal-600 p-6">
                <h1 class="text-3xl font-bold text-white">TRON dApp</h1>
                <p class="text-blue-100 text-sm mt-1">Real WalletConnect Integration</p>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Status Badge -->
                <div class="mb-6">
                    <div id="status-badge" class="inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold">
                        🔴 Disconnected
                    </div>
                </div>

                <!-- QR Code Container -->
                <div id="qr-container" class="mb-6 p-4 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300 flex justify-center items-center" style="min-height: 280px;">
                    <div class="text-center">
                        <div id="qrcode" style="width: 220px; height: 220px;"></div>
                        <p class="text-sm text-gray-600 mt-3">Scan with Trust Wallet</p>
                    </div>
                </div>

                <!-- Wallet Address Display -->
                <div id="wallet-info" class="hidden mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p class="text-sm text-gray-600 mb-2">💼 Connected Wallet:</p>
                    <p id="wallet-address" class="font-mono text-xs text-blue-900 break-all font-bold bg-white p-2 rounded border border-blue-300"></p>
                    
                    <p class="text-sm text-gray-600 mb-2 mt-4">🌐 Network:</p>
                    <p class="font-mono text-sm text-blue-900 font-bold">TRON Mainnet</p>

                    <p class="text-sm text-gray-600 mb-2 mt-4">💰 Balance:</p>
                    <p id="wallet-balance" class="font-mono text-sm text-blue-900 font-bold">Loading...</p>
                </div>

                <!-- Connect/Disconnect Button -->
                <div class="space-y-3">
                    <button id="connect-btn" onclick="connectWallet()" class="w-full bg-gradient-to-r from-blue-600 to-teal-600 hover:from-blue-700 hover:to-teal-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 active:scale-95">
                        🔗 Connect Wallet
                    </button>
                    <button id="disconnect-btn" onclick="disconnectWallet()" class="hidden w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 rounded-lg transition">
                        🔌 Disconnect
                    </button>
                </div>

                <!-- Status Message -->
                <div id="status-message" class="mt-4 p-3 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm">
                    <p id="status-text">👉 Click "Connect Wallet" and scan QR with Trust Wallet</p>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="hidden mt-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm">
                    <p id="error-text"></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-xs text-gray-600 text-center">
                    WalletConnect v2 | TRON Mainnet | Real Connection
                </p>
            </div>
        </div>
    </div>

    <!-- WalletConnect v2 SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.11.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const WALLETCONNECT_PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f';
        
        // TRON Network Configuration
        const TRON_MAINNET = {
            chainId: 'tron:0x2b6653dc',
            chainName: 'TRON Mainnet',
            rpcUrl: 'https://api.tronstack.io/jsonrpc',
            nativeCurrency: {
                name: 'TRX',
                symbol: 'TRX',
                decimals: 6
            }
        };

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let provider = null;
        let session = null;
        let walletAddress = null;

        // ============================================
        // INITIALIZE WALLETCONNECT V2
        // ============================================
        async function initWalletConnect() {
            try {
                console.log('🚀 Initializing WalletConnect v2...');

                // Create EthereumProvider with proper config
                provider = await EthereumProvider.init({
                    projectId: WALLETCONNECT_PROJECT_ID,
                    chains: [1], // Ethereum mainnet as default
                    optionalChains: [137, 56, 1, 43114], // Polygon, BSC, Eth, Avax
                    rpcMap: {
                        1: 'https://eth.llamarpc.com',
                        137: 'https://polygon-rpc.com',
                        56: 'https://bsc-dataseed.binance.org'
                    },
                    metadata: {
                        name: 'TRON dApp',
                        description: 'Connect your TRON wallet via WalletConnect',
                        url: window.location.origin,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });

                // Listen for connection events
                provider.on('connect', handleConnect);
                provider.on('disconnect', handleDisconnect);
                provider.on('chainChanged', handleChainChanged);
                provider.on('accountsChanged', handleAccountsChanged);

                console.log('✅ WalletConnect initialized');

                // Check if already connected
                if (provider.session) {
                    session = provider.session;
                    walletAddress = provider.accounts[0];
                    console.log('📍 Existing session found:', walletAddress);
                    updateConnectedUI(walletAddress);
                }

            } catch (error) {
                console.error('❌ WalletConnect initialization error:', error);
                showError('Failed to initialize WalletConnect: ' + error.message);
            }
        }

        // ============================================
        // CONNECT WALLET
        // ============================================
        async function connectWallet() {
            try {
                console.log('🔗 Connecting to wallet...');
                updateStatus('🔄 Requesting connection...', 'loading');

                // Request connection
                const accounts = await provider.enable();
                
                console.log('✅ Connection successful!');
                console.log('📍 Connected accounts:', accounts);

                // Get connected account
                walletAddress = accounts[0];
                session = provider.session;

                // Save to localStorage
                localStorage.setItem('walletconnect_session', JSON.stringify({
                    address: walletAddress,
                    timestamp: new Date().toISOString()
                }));

                updateConnectedUI(walletAddress);
                await fetchWalletBalance(walletAddress);

                updateStatus('✅ Successfully connected!', 'success');

            } catch (error) {
                console.error('❌ Connection error:', error);
                
                if (error.code === 4001) {
                    showError('Connection rejected by user');
                } else if (error.code === -32602) {
                    showError('Invalid parameters. Please make sure Trust Wallet is installed');
                } else {
                    showError('Connection failed: ' + error.message);
                }
            }
        }

        // ============================================
        // FETCH WALLET BALANCE
        // ============================================
        async function fetchWalletBalance(address) {
            try {
                console.log('💰 Fetching balance for:', address);
                
                // For TRON, you would typically use:
                // TronWeb or TRON API to get balance
                // For now, showing placeholder
                
                // Note: In production, integrate with TRON API
                // Example: https://api.tronstack.io/v1/account/balance?address=
                
                const balanceElement = document.getElementById('wallet-balance');
                balanceElement.textContent = 'TRX (fetching from TRON network...)';
                
                console.log('📊 Balance fetch initiated');

            } catch (error) {
                console.error('❌ Balance fetch error:', error);
                const balanceElement = document.getElementById('wallet-balance');
                balanceElement.textContent = 'Error fetching balance';
            }
        }

        // ============================================
        // EVENT HANDLERS
        // ============================================
        function handleConnect(event) {
            console.log('🟢 Connected event:', event);
            session = event.session || provider.session;
            walletAddress = provider.accounts[0];
            updateConnectedUI(walletAddress);
        }

        function handleDisconnect() {
            console.log('🔴 Disconnected event');
            session = null;
            walletAddress = null;
            localStorage.removeItem('walletconnect_session');
            updateDisconnectedUI();
        }

        function handleChainChanged(chainId) {
            console.log('🔗 Chain changed:', chainId);
        }

        function handleAccountsChanged(accounts) {
            console.log('👤 Account changed:', accounts);
            if (accounts.length > 0) {
                walletAddress = accounts[0];
                updateConnectedUI(walletAddress);
                fetchWalletBalance(walletAddress);
            } else {
                updateDisconnectedUI();
            }
        }

        // ============================================
        // UPDATE CONNECTED UI
        // ============================================
        function updateConnectedUI(address) {
            console.log('🎨 Updating UI for connected state');

            // Update status badge
            document.getElementById('status-badge').innerHTML = '🟢 Connected';
            document.getElementById('status-badge').className = 
                'inline-block px-4 py-2 rounded-full bg-green-100 text-green-800 text-sm font-semibold';
            
            // Display wallet address
            document.getElementById('wallet-address').textContent = address;
            document.getElementById('wallet-info').classList.remove('hidden');
            
            // Toggle buttons
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('disconnect-btn').classList.remove('hidden');
            
            // Hide QR code
            document.getElementById('qr-container').classList.add('hidden');
            
            // Clear error
            clearError();
            
            updateStatus('✅ Wallet connected successfully!', 'success');
            
            console.log('✅ UI updated for connected state');
        }

        // ============================================
        // UPDATE DISCONNECTED UI
        // ============================================
        function updateDisconnectedUI() {
            console.log('🎨 Updating UI for disconnected state');

            // Update status badge
            document.getElementById('status-badge').innerHTML = '🔴 Disconnected';
            document.getElementById('status-badge').className = 
                'inline-block px-4 py-2 rounded-full bg-red-100 text-red-800 text-sm font-semibold';
            
            document.getElementById('wallet-info').classList.add('hidden');
            document.getElementById('qr-container').classList.remove('hidden');
            
            document.getElementById('connect-btn').classList.remove('hidden');
            document.getElementById('disconnect-btn').classList.add('hidden');
            
            updateStatus('👉 Click "Connect Wallet" to scan QR', 'default');
            
            console.log('✅ UI updated for disconnected state');
        }

        // ============================================
        // DISCONNECT WALLET
        // ============================================
        async function disconnectWallet() {
            try {
                console.log('🔌 Disconnecting wallet...');
                
                if (provider) {
                    await provider.disconnect();
                }
                
                session = null;
                walletAddress = null;
                localStorage.removeItem('walletconnect_session');
                
                updateDisconnectedUI();
                clearError();
                
                console.log('✅ Wallet disconnected');
            } catch (error) {
                console.error('❌ Disconnect error:', error);
                showError('Disconnect failed: ' + error.message);
            }
        }

        // ============================================
        // UI HELPER FUNCTIONS
        // ============================================
        function updateStatus(message, type = 'default') {
            const statusText = document.getElementById('status-text');
            statusText.textContent = message;
            
            const statusMsg = document.getElementById('status-message');
            statusMsg.className = 'mt-4 p-3 rounded-lg text-sm';
            
            switch(type) {
                case 'success':
                    statusMsg.className += ' bg-green-50 border border-green-200 text-green-800';
                    break;
                case 'loading':
                    statusMsg.className += ' bg-blue-50 border border-blue-200 text-blue-800';
                    break;
                default:
                    statusMsg.className += ' bg-yellow-50 border border-yellow-200 text-yellow-800';
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
            console.error('❌', message);
        }

        function clearError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        // ============================================
        // INITIALIZE ON PAGE LOAD
        // ============================================
        window.addEventListener('load', async () => {
            console.log('📄 Page loaded');
            await initWalletConnect();
            
            // Check for existing session
            const savedSession = localStorage.getItem('walletconnect_session');
            if (savedSession) {
                try {
                    const data = JSON.parse(savedSession);
                    console.log('📍 Found saved session:', data.address);
                    // Session will be restored if provider still has it
                } catch (e) {
                    localStorage.removeItem('walletconnect_session');
                }
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            console.log('👋 Page unloading');
        });
    </script>
</body>
</html>
